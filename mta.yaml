_schema-version: "3.2"
ID: btptestproject
description: Generated by Fiori Tools
version: 0.0.2

modules:
  - name: btptestproject
    type: html5
    path: .
    build-parameters:
      builder: custom
      commands:
        - npm install
        - npm run build:cf
      build-result: dist
      supported-platforms: []

  - name: btptestproject-app-content
    type: com.sap.application.content
    path: .
    requires:
      - name: btptestproject-html5-repo-host
        parameters:
          content-target: true
    build-parameters:
      build-result: resources
      requires:
        - artifacts:
            - btptestproject.zip
          name: btptestproject
          target-path: resources/

  - name: btptestproject-destination-content
    type: com.sap.application.content
    requires:
      - name: btptestproject-destination-service
        parameters:
          content-target: true
      - name: btptestproject-html5-repo-host
        parameters:
          service-key:
            name: btptestproject-html5-repo-host-key
      - name: btptestproject-xsuaa-service
        parameters:
          service-key:
            name: btptestproject-xsuaa-service-key
    parameters:
      content:
        instance:
          destinations:
            - Name: btptestproject-html5-repo-host-dest
              ServiceInstanceName: btptestproject-html5-repo-host
              ServiceKeyName: btptestproject-html5-repo-host-key
              sap.cloud.service: btptestproject
          existing_destinations_policy: ignore
    build-parameters:
      no-source: true
      
resources:
  - name: btptestproject-destination-service
    type: org.cloudfoundry.managed-service
    parameters:
      service: destination
      service-plan: lite
      config:
        HTML5Runtime_enabled: true
        init_data:
          instance:
            existing_destinations_policy: update
            destinations:
              - Name: ui5
                URL: https://ui5.sap.com
                Type: HTTP
                ProxyType: Internet
                Authentication: NoAuthentication

              - Name: btp_backend_destination
                URL: https://3cd18aa3trial-dev-my-btp-app-srv.cfapps.us10-001.hana.ondemand.com
                Type: HTTP
                ProxyType: Internet
                Authentication: NoAuthentication

  - name: btptestproject-html5-repo-host
    type: org.cloudfoundry.managed-service
    parameters:
      service: html5-apps-repo
      service-plan: app-host
  
  - name: btptestproject-html5-repo-runtime
    type: org.cloudfoundry.managed-service
    parameters:
      service: html5-apps-repo
      service-plan: app-runtime

  - name: btptestproject-xsuaa-service
    type: org.cloudfoundry.managed-service
    parameters:
      path: ./xs-security.json
      service: xsuaa
      service-plan: application

parameters:
  deploy_mode: html5-repo
